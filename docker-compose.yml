services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: upnext
      POSTGRES_PASSWORD: upnext
      POSTGRES_DB: upnext_creators
    ports:
      - "5432:5432"
    volumes:
      - upnext_pg_data:/var/lib/postgresql/data

volumes:
  upnext_pg_data:

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#556B2F" />
    <title>Offline | UpNext Creators</title>
    <style>
      :root {
        color-scheme: light dark;
        --milky: #faf7f2;
        --olive: #556b2f;
        --olive-900: #2f3b1a;
        --olive-600: #556b2f;
        --olive-100: #e8edd9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(145deg, var(--milky), #e8e4d9);
        color: var(--olive-900);
      }
      .card {
        width: min(100%, 26rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: color-mix(in srgb, var(--milky) 88%, transparent);
        border: 1px solid color-mix(in srgb, var(--olive) 25%, transparent);
        box-shadow: 0 20px 50px rgb(47 59 26 / 12%);
        backdrop-filter: blur(16px);
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.6rem;
      }
      p {
        margin: 0 0 1.5rem;
        line-height: 1.5;
        color: var(--olive);
        font-family: system-ui, sans-serif;
        font-size: 0.95rem;
      }
      button {
        border: 0;
        border-radius: 0.85rem;
        padding: 0.85rem 1.25rem;
        background: var(--olive-600);
        color: var(--milky);
        font-weight: 600;
        font-family: system-ui, sans-serif;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(0.95);
      }
      .mark {
        width: 3.5rem;
        height: 3.5rem;
        margin: 0 auto 1rem;
        border-radius: 1rem;
        background: var(--olive-100);
        display: grid;
        place-items: center;
        font-size: 1.4rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark" aria-hidden="true">○</div>
      <h1>You're offline</h1>
      <p>
        UpNext Creators can't reach the network right now. Reconnect and try
        again.
      </p>
      <button type="button" onclick="location.reload()">Retry connection</button>
    </main>
  </body>
</html>
